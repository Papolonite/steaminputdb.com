info:
  description: |
    [_SteamInputDB.com_](https://steaminputdb.com) is a community-driven database of Steam Input configurations for various games,
    **backed by the official Steam Web API**.

    [_SteamInputDB_](https://steaminputdb.com) allows users to share, discover,
    and download custom controller configurations to enhance their gaming experience on Steam.

    This API allows developers and users to access and interact with the database programmatically.  
  license:
    identifier: AGPL-3.0
    name: GNU Affero General Public License v3.0
    url: https://www.gnu.org/licenses/agpl-3.0.en.html
  title: SteamInputDB API
  version: dev
openapi: 3.1.0
paths:
  /v1/ping:
    get:
      description: Health check and basic information
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ping"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Ping
      tags:
        - meta
  /v1/search/:
    post:
      description: |
        Search for games that are available on Steam
        **and** Search for SteamInput configurations for Steam and non-Steam games
        **all at once**

        This endpoint supports no pagination and has pretty strict limits, it's intended for the "main-page" of the Frontend only
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequestBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponseBody"
          description: OK
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Search Steam games and configurations all at once
      tags:
        - search
  /v1/search/configs:
    post:
      description: Search for SteamInput configurations for Steam and non-Steam games
