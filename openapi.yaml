components:
  schemas:
    AppFilter:
      additionalProperties: false
      properties:
        include_demos:
          default: false
          description: Include demos in the search results
          type: boolean
        include_games:
          default: true
          description: Include games in the search results
          type: boolean
        include_mods:
          default: false
          description: Include mods in the search results
          type: boolean
      type: object
    AppItem:
      additionalProperties: false
      properties:
        app_id:
          examples:
            - 440
          format: int32
          minimum: 0
          type:
            - integer
            - "null"
        assets:
          $ref: "#/components/schemas/StoreItem_Assets"
        basic_info:
          $ref: "#/components/schemas/StoreItem_BasicInfo"
        links:
          items:
            type: string
          type: array
        name:
          examples:
            - Team Fortress 2
          type:
            - string
            - "null"
        platforms:
          $ref: "#/components/schemas/AppsPlatforms"
        release:
          $ref: "#/components/schemas/AppsRelease"
        store_url_path:
          examples:
            - app/440/Team_Fortress_2
          type:
            - string
            - "null"
        type:
          enum:
            - game
            - demo
            - mod
          examples:
            - game
          type: string
      required:
        - app_id
        - name
        - store_url_path
        - type
      type: object
    AppsInclude:
      additionalProperties: false
      properties:
        assets:
          default: false
          description: Include app assets in the response
          type: boolean
        info:
          default: false
          description: Include app information in the response
          type: boolean
        links:
          default: false
          description: Include app links in the response
          type: boolean
        platforms:
          default: false
          description: Include app platform information in the response
          type: boolean
        ratings:
          default: false
          description: Include app ratings in the response
          type: boolean
        release:
          default: false
          description: Include app release information in the response
          type: boolean
      type: object
    AppsPlatforms:
      additionalProperties: false
      properties:
        mac:
          examples:
            - false
          type:
            - boolean
            - "null"
        steamos_linux:
          examples:
            - true
          type:
            - boolean
            - "null"
        windows:
          examples:
            - true
          type:
            - boolean
            - "null"
      required:
        - windows
        - steamos_linux
        - mac
      type: object
    AppsQueryBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://localhost:8889/schemas/AppsQueryBody.json
          format: uri
          readOnly: true
          type: string
        filter:
          $ref: "#/components/schemas/AppFilter"
        include:
          $ref: "#/components/schemas/AppsInclude"
        limit:
          default: 5
          description: Maximum number of results to return
          format: int32
          minimum: 0
          type: integer
        query_text:
          description: The search query string
          maxLength: 100
          type: string
        raw:
          default: false
          description: Return raw Steam API response
          type: boolean
      required:
        - query_text
      type: object
    AppsRelease:
      additionalProperties: false
      properties:
        original_release_date:
          format: date-time
          type: string
        steam_release_date:
          format: date-time
          type: string
      type: object
    AppsResponse:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/AppItem"
          type:
            - array
            - "null"
        total:
          description: Total number of matching items
          examples:
            - 123
          format: int32
          type:
            - integer
            - "null"
      required:
        - total
        - items
      type: object
    CPublishedFile_GetDetails_Response:
      additionalProperties: false
      properties:
        publishedfiledetails:
          items:
            $ref: "#/components/schemas/PublishedFileDetails"
          type:
            - array
            - "null"
      type: object
    CPublishedFile_QueryFiles_Response:
      additionalProperties: false
      properties:
        next_cursor:
          type: string
        publishedfiledetails:
          items:
            $ref: "#/components/schemas/PublishedFileDetails"
          type:
            - array
            - "null"
        total:
          format: int32
          minimum: 0
          type: integer
      type: object
    CStoreQueryPerResultMetadata:
      additionalProperties: false
      properties:
        id:
          $ref: "#/components/schemas/StoreItemID"
        score:
          format: double
          type: number
        spellcheck_generated_result:
          type: boolean
      type: object
    CStoreQueryResultMetadata:
      additionalProperties: false
      properties:
        count:
          format: int32
          type: integer
        per_result_metadata:
          items:
            $ref: "#/components/schemas/CStoreQueryPerResultMetadata"
          type:
            - array
            - "null"
        spellcheck_suggestions:
          items:
            type: string
          type:
            - array
            - "null"
        start:
          format: int32
          type: integer
        total_matching_records:
          format: int32
          type: integer
      type: object
    CStoreQuery_SearchSuggestions_Response:
      additionalProperties: false
      properties:
        ids:
          items:
            $ref: "#/components/schemas/StoreItemID"
          type:
            - array
            - "null"
        metadata:
          $ref: "#/components/schemas/CStoreQueryResultMetadata"
        store_items:
          items:
            $ref: "#/components/schemas/StoreItem"
          type:
            - array
            - "null"
      type: object
    ConfigDetailResponse:
      additionalProperties: false
      properties:
        app_id:
          examples:
            - 420
          format: int32
          minimum: 0
          type: integer
        app_id_string:
          description: AppID as string or name for Non-Steam Games
          examples:
            - "420"
          type:
            - string
            - "null"
        controller_native:
          description: Unsure
          examples:
            - true
          type: boolean
        controller_type:
          description: Type of controller this configuration is designed for
          examples:
            - controller_steamcontroller_gordon
          type: string
        controller_type_nice:
          description: Human-friendly name of the controller type
          examples:
            - Steam Controller (2015)
          type: string
        creator_id:
          description: Steam User ID of the configuration creator
          examples:
            - "76561198000000000"
          type: string
        description:
          examples:
            - An awesome configuration for an awesome game
          type:
            - string
            - "null"
        file_id:
          examples:
            - 1234567890
          format: int64
          minimum: 0
          type:
            - integer
            - "null"
        file_name:
          examples:
            - controllerconfig.vdf
          type:
            - string
            - "null"
        file_size:
          description: File size in bytes
          examples:
            - 2048
          format: int64
          minimum: 0
          type:
            - integer
            - "null"
        file_url:
          examples:
            - https://cdn.steamusercontent.com/ugc/UGCID/HASH
          type:
            - string
            - "null"
        lifetime_playtime_seconds:
          description: Total playtime in seconds
          examples:
            - 4474585092
          format: int64
          minimum: 0
          type:
            - integer
            - "null"
        lifetime_playtime_sessions:
          description: Total number of playtime sessions
          examples:
            - 1234
          format: int64
          minimum: 0
          type:
            - integer
            - "null"
        playtime_seconds:
          description: Total playtime in seconds with the specified time period
          examples:
            - 4474585092
          format: int64
          minimum: 0
          type:
            - integer
            - "null"
        playtime_sessions:
          description: Total number of playtime sessions within the specified time period
          examples:
            - 1234
          format: int64
          minimum: 0
          type:
            - integer
            - "null"
        subscriptions:
          description: Total number of Downloads
          examples:
            - 1500
          format: int32
          minimum: 0
          type:
            - integer
            - "null"
        tags:
          description: List of tags associated with the configuration
          examples:
            - - controller_xboxone
              - feature_gyro
          items:
            type: string
          type: array
        time_created:
          format: date-time
          type: string
        time_updated:
          format: date-time
          type: string
        title:
          examples:
            - My Awesome Config
          type:
            - string
            - "null"
        votes:
          $ref: "#/components/schemas/ConfigDetailResponseVotesStruct"
      required:
        - playtime_seconds
        - playtime_sessions
        - title
        - description
        - app_id_string
        - file_id
        - file_name
        - file_url
        - file_size
        - creator_id
        - time_created
        - time_updated
        - lifetime_playtime_seconds
        - lifetime_playtime_sessions
        - subscriptions
      type: object
    ConfigDetailResponseVotesStruct:
      additionalProperties: false
      properties:
        down:
          description: Number of downvotes
          examples:
            - 20
          format: int32
          minimum: 0
          type:
            - integer
            - "null"
        score:
          description: Average vote score
          examples:
            - 4.5
          format: float
          type:
            - number
            - "null"
        up:
          description: Number of upvotes
          examples:
            - 100
          format: int32
          minimum: 0
          type:
            - integer
            - "null"
      required:
        - score
        - up
        - down
      type: object
    ConfigFilter:
      additionalProperties: false
      properties:
        app_id:
          description: Only search configurations for this specific Steam App ID (Non-Steam Games use their name as AppID)
          maxLength: 100
          type: string
        excluded_tags:
          description: Filter results to only include configurations that do not have any of the specified tags
          items:
            type: string
          type:
            - array
            - "null"
        tags:
          description: Filter results to only include configurations with all of the specified tags
          items:
            type: string
          type:
            - array
            - "null"
      type: object
    ConfigInclude:
      additionalProperties: false
      properties:
        tags:
          default: false
          description: Include tags
          type: boolean
        votes:
          default: false
          description: Include vote data
          type: boolean
