    ConfigQueryBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://localhost:8889/schemas/ConfigQueryBody.json
          format: uri
          readOnly: true
          type: string
        filter:
          $ref: "#/components/schemas/ConfigFilter"
        include:
          $ref: "#/components/schemas/ConfigInclude"
        limit:
          default: 5
          description: Maximum number of results to return
          format: int32
          minimum: 0
          type: integer
        page:
          description: Page number for paginated results
          format: int32
          minimum: 0
          type: integer
        query_text:
          description: The search query string
          maxLength: 100
          type: string
        rank:
          $ref: "#/components/schemas/ConfigRank"
        raw:
          default: false
          description: Return raw Steam API response
          type: boolean
      required:
        - query_text
      type: object
    ConfigRank:
      additionalProperties: false
      properties:
        by:
          default: vote
          description: Criterion to rank search results by
          enum:
            - vote
            - publication
            - trend
            - subscriptions
            - votes_asc
            - votes_up
            - text_search
            - playtime_trend
            - total_playtime
            - avg_playtime_trend
            - lifetime_avg_playtime
            - playtime_sessions_trend
            - lifetime_playtime_sessions
            - updated
          type: string
        trending_period:
          default: 30
          description: Number of days to consider for trending rank
          format: int32
          minimum: 0
          type: integer
      type: object
