name: steaminputdb.com Build Base

on:
    push:
        branches: ["main"]
    workflow_call:
        inputs:
            artifact_suffix:
                required: false
                type: string
                default: ""
                description: "Suffix to add to artifact names"
            upload_artifacts:
                required: false
                type: boolean
                default: false
                description: "Whether to upload build artifacts"

jobs:
    frontend-lint:
        name: Frontend Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: "frontend/.nvmrc"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              working-directory: frontend
              run: npm ci

            - name: Install build tools
              run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

            - name: Generate frontend protos
              working-directory: frontend
              run: npm run gen

            - name: Run ESLint
              working-directory: frontend
              run: npm run lint:ci

    frontend-test:
        name: Frontend Test
        runs-on: ubuntu-latest
        env:
            PUBLIC_API_BASE_URL: https://api.steaminputdb.com/
            PUBLIC_API_BASE_URL_LOCAL: http://localhost:8889/
            PUBLIC_DEV: "1"
            PUBLIC_API_SERVER_URL: http://localhost:8889/
            PUBLIC_LOG_LEVEL: debug
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: "frontend/.nvmrc"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              working-directory: frontend
              run: npm ci

            - name: Install build tools
              run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

            - name: Generate frontend protos
              working-directory: frontend
              run: npm run gen

            - name: Install Playwright browsers
              working-directory: frontend
              run: npx playwright install --with-deps

            - name: Run unit tests
              working-directory: frontend
              run: npm run test:unit -- --run

            - name: Run e2e tests
              working-directory: frontend
              run: npm run test:e2e

    frontend-build:
        name: Build Frontend
        runs-on: ubuntu-latest
        env:
            PUBLIC_API_BASE_URL: https://api.steaminputdb.com/
            PUBLIC_API_BASE_URL_LOCAL: http://localhost:8889/
            PUBLIC_DEV: ""
            PUBLIC_API_SERVER_URL: http://localhost:8889/
            PUBLIC_LOG_LEVEL: debug

        needs: [frontend-lint, frontend-test]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: "frontend/.nvmrc"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              working-directory: frontend
              run: npm ci

            - name: Install build tools
              run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

            - name: Generate frontend protos
              working-directory: frontend
              run: npm run gen

            - name: Build
              working-directory: frontend
              run: npm run build

    backend-test:
        name: Backend Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  submodules: recursive

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26.0-rc.2"
                  cache: true
                  cache-dependency-path: |
                      backend/go.sum

            - name: Install build tools
              run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

            - name: Install protoc-gen-go
              run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

            - name: Generate backend protos
              working-directory: backend
              shell: bash
              run: |
                  chmod +x ./scripts/gen.sh
                  ./scripts/gen.sh

            - name: Create frontend dir
              run: |
                  mkdir -p frontend/dist
                  touch frontend/dist/.placeholder
              working-directory: backend

            - name: Run tests
              working-directory: backend
              run: go test -count=1 -v -coverpkg="./..." -coverprofile="coverage.txt" ./...

    backend-lint:
        name: Backend Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26.0-rc.2"
                  cache: true
                  cache-dependency-path: |
                      backend/go.sum

            - name: Install build tools
              run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

            - name: Install protoc-gen-go
              run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

            - name: Generate backend protos
              working-directory: backend
              shell: bash
              run: |
                  chmod +x ./scripts/gen.sh
                  ./scripts/gen.sh
            - name: Create frontend dir
              run: |
                  mkdir -p frontend/dist
                  touch frontend/dist/.placeholder
              working-directory: backend

            - name: golangci-lint
              uses: golangci/golangci-lint-action@v9
              with:
                  version: latest
                  install-mode: goinstall
                  working-directory: backend

    build:
        name: Build binaries (${{ matrix.target.goos }}/${{ matrix.target.goarch }})
        runs-on: ubuntu-latest
        needs:
            [
                backend-lint,
                backend-test,
                frontend-lint,
                frontend-test,
                frontend-build,
            ]
        strategy:
            fail-fast: false
            matrix:
                target:
                    - { goos: linux, goarch: amd64, ext: "" }

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  submodules: recursive

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26.0-rc.2"
                  cache: true
                  cache-dependency-path: |
                      backend/go.sum

            - name: Install build tools
              run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

            - name: Install protoc-gen-go
              run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

            - name: Generate backend protos
              working-directory: backend
              shell: bash
              run: |
                  chmod +x ./scripts/gen.sh
                  ./scripts/gen.sh

            - name: Create frontend dir
              run: |
                  mkdir -p frontend/dist
                  touch frontend/dist/.placeholder
              working-directory: backend

            - name: Build
              working-directory: backend
              env:
                  GOOS: ${{ matrix.target.goos }}
                  GOARCH: ${{ matrix.target.goarch }}
                  CGO_ENABLED: 0
              run: |
                  VERSION=$(git describe --tags --match "v[0-9]*.[0-9]*.[0-9]*" --always || echo "v0.0.0-dev")
                  mkdir -p dist
                  go build -trimpath -ldflags "-s -w" -o dist/steaminputdb-${{ matrix.target.goos }}-${{ matrix.target.goarch }}${{ matrix.target.ext }} ./cmd/steaminputdb
                  ls -la dist
